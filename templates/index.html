<!DOCTYPE html>
<html>

<head>
    <title>AI Learner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-700 to-purple-700 text-white min-h-screen">

    <div class="flex justify-between p-4 bg-black/30">
        <h1 class="text-xl font-bold">🧠 AI Learner</h1>
        <a href="/train" class="bg-green-500 px-4 py-1 rounded">+ Train</a>
    </div>

    <div class="p-6 text-center">

        <h2 class="text-2xl mb-4">📊 Dataset</h2>

        <div class="grid grid-cols-2 gap-4 max-w-xl mx-auto">
            {% for key, value in data.items() %}
            <div class="bg-white/10 p-4 rounded-xl">
                <h3>{{ key }}</h3>
                <p>{{ value }} samples</p>
            </div>
            {% endfor %}
        </div>

        <div class="max-w-md mx-auto mt-8 bg-white/10 p-6 rounded-xl">

            <h2>🔍 Predict</h2>

            <form action="/predict" method="POST" enctype="multipart/form-data">

                <div id="drop-area" class="border-2 border-dashed p-6 rounded cursor-pointer">
                    <p>Drag & Drop / Click</p>
                    <input type="file" name="image" id="fileElem" hidden>
                    <img id="preview" class="hidden mt-4 w-32 mx-auto">
                </div>

                <button class="mt-4 w-full bg-indigo-500 p-2 rounded">Predict</button>

            </form>

        </div>

    </div>

    <script>
        const dropArea = document.getElementById("drop-area");
        const fileInput = document.getElementById("fileElem");
        const preview = document.getElementById("preview");

        dropArea.onclick = () => fileInput.click();

        fileInput.onchange = () => {
            preview.src = URL.createObjectURL(fileInput.files[0]);
            preview.classList.remove("hidden");
        };

        dropArea.ondrop = (e) => {
            e.preventDefault();
            fileInput.files = e.dataTransfer.files;
            preview.src = URL.createObjectURL(fileInput.files[0]);
            preview.classList.remove("hidden");
        };

        dropArea.ondragover = e => e.preventDefault();
    </script>

</body>

</html>
