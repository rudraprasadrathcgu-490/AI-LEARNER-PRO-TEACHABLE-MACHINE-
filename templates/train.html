<!DOCTYPE html>
<html>

<head>
    <title>Train</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-700 to-indigo-700 text-white">

    <div class="flex justify-between p-4 bg-black/30">
        <a href="/" class="bg-white text-black px-3 py-1 rounded">⬅ Home</a>
        <h1>Train Model</h1>
    </div>

    <div class="flex justify-center mt-10">
        <div class="bg-white/10 p-6 rounded-xl">

            <form method="POST" enctype="multipart/form-data">

                <input type="text" name="label" placeholder="Label" class="w-full p-2 text-black mb-3">

                <input type="file" name="image" class="w-full p-2 text-black mb-3">

                <button class="w-full bg-green-500 p-2 rounded">Train</button>

            </form>

        </div>
    </div>

</body>

</html>
